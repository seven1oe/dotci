version: 1.0.{build}
image: Ubuntu2004

environment:
  APPVEYOR_SSH_KEY: ssh-rsa  rsa 2048-082321

install:
  - sudo apt-get update
  - sudo apt-get install -y gcc make pkg-config git bison flex libelf-dev libssl-dev libncurses5-dev bc

before_build:
  - wget https://releases.linaro.org/components/toolchain/binaries/5.3-2016.05/arm-linux-gnueabihf/gcc-linaro-5.3.1-2016.05-x86_64_arm-linux-gnueabihf.tar.xz
  - tar -xJf gcc-linaro-5.3.1-2016.05-x86_64_arm-linux-gnueabihf.tar.xz

  - wget https://github.com/kenyapcomau/p910nd/archive/0.97/p910nd-0.97.tar.gz
  - tar -xzf p910nd-0.97.tar.gz

  - wget https://github.com/libusb/libusb/releases/download/v1.0.27/libusb-1.0.27.tar.bz2
  - tar -xjf libusb-1.0.27.tar.bz2

  - wget https://github.com/OpenPrinting/cups/releases/download/v2.4.10/cups-2.4.10-source.tar.gz
  - tar -xzf cups-2.4.10-source.tar.gz

  - wget https://github.com/mm2/Little-CMS/releases/download/lcms2.16/lcms2-2.16.tar.gz
  - tar -xzf lcms2-2.16

  - wget https://github.com/OpenPrinting/cups-filters/releases/download/2.0.1/cups-filters-2.0.1.tar.gz
  - tar -xzf cups-filters-2.0.1.tar.gz

  - export PATH=$(pwd)/gcc-linaro-5.3.1-2016.05-x86_64_arm-linux-gnueabihf/bin:$PATH

build_script:
  - cd $APPVEYOR_BUILD_FOLDER/p910nd-0.97
  - make CROSS=arm-linux-gnueabihf-

  - cd $APPVEYOR_BUILD_FOLDER/libusb-1.0.27
  - ./configure --help
  - ./configure --host=arm-linux-gnueabihf --prefix=/usr
                                           --disable-udev
  - make
  - make DESTDIR=$APPVEYOR_BUILD_FOLDER/build install

  - export PKG_CONFIG_ALLOW_SYSTEM_LIBS=1
  - export PKG_CONFIG_SYSROOT_DIR=$APPVEYOR_BUILD_FOLDER/build
  # PKG_CONFIG_PATH==insert PKG_CONFIG_LIBDIR==replace
  - export PKG_CONFIG_PATH=$APPVEYOR_BUILD_FOLDER/build/usr/lib/pkgconfig

  - cd $APPVEYOR_BUILD_FOLDER/cups-2.4.10
  - ./configure --help
  - ./configure --host=arm-linux-gnueabihf --libdir=/usr/lib
                                           --enable-libusb
                                           --disable-dbus
                                           --without-tls
  - make
  - make DESTDIR=$APPVEYOR_BUILD_FOLDER/build STRIPPROG=arm-linux-gnueabihf-strip install

  - cd lcms2-2.16
  - ./configure --help
  - ./configure --host=arm-linux-gnueabihf 
  - make
  - make DESTDIR=$APPVEYOR_BUILD_FOLDER/build install

  - cd $APPVEYOR_BUILD_FOLDER/cups-filters-2.0.1
  - ./configure --help
  - ./configure --host=arm-linux-gnueabihf --with-cups-config=$APPVEYOR_BUILD_FOLDER/build/usr/bin/cups-config
  - make
  - make DESTDIR=$APPVEYOR_BUILD_FOLDER/build install

on_finish:
  - sh: export APPVEYOR_SSH_BLOCK=true
  - sh: curl -sflL 'https://raw.githubusercontent.com/appveyor/ci/master/scripts/enable-ssh.sh' | bash -e -

test: off
artifacts:
- path: p910nd-0.97
  name: p910nd-0.97
- path: build
  name: build
- path: cups-2.4.10
  name: cups-2.4.10
- path: libusb-1.0.27
  name: libusb-1.0.27
