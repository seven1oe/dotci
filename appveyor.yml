version: 1.0.{build}
image: Ubuntu2004

environment:
  KERNELPATH: v4.x
  KERNELVERSION: 4.1.25
  TOOLCHAINVERSION: 5.3.1-2016.05

  MAKEVARIABLES: ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-

install:
  - sudo apt-get update
  - sudo apt-get install -y gcc make pkg-config git bison flex libelf-dev libssl-dev libncurses5-dev bc

before_build:
  - wget https://releases.linaro.org/components/toolchain/binaries/5.3-2016.05/aarch64-linux-gnu/gcc-linaro-$TOOLCHAINVERSION-x86_64_aarch64-linux-gnu.tar.xz
  - tar -xJf gcc-linaro-$TOOLCHAINVERSION-x86_64_aarch64-linux-gnu.tar.xz

  - wget https://cdn.kernel.org/pub/linux/kernel/$KERNELPATH/linux-$KERNELVERSION.tar.xz
  - tar -xJf linux-$KERNELVERSION.tar.xz

  - export PATH=$(pwd)/gcc-linaro-$TOOLCHAINVERSION-x86_64_aarch64-linux-gnu/bin:$PATH

build_script:
  - cd $APPVEYOR_BUILD_FOLDER/linux-$KERNELVERSION

  - make ${MAKEVARIABLES} defconfig
  # fix
  - sed -i "s/CONFIG_JUMP_LABEL=y/CONFIG_JUMP_LABEL=n/" .config
  - sed -i "s/# CONFIG_MODULE_SIG is not set/CONFIG_MODULE_SIG=y/" .config
  # usblp
  - sed -i "s/CONFIG_PREEMPT=y/CONFIG_PREEMPT=n/" .config
  - sed -i "s/CONFIG_UNINLINE_SPIN_UNLOCK=y/CONFIG_UNINLINE_SPIN_UNLOCK=n/" .config

  - make ${MAKEVARIABLES} KCONFIG_ALLCONFIG=.config allnoconfig
  - make ${MAKEVARIABLES} prepare

  - sed -i "s/YYLTYPE yylloc;/extern YYLTYPE yylloc;/" scripts/dtc/dtc-lexer.lex.c_shipped
  - make ${MAKEVARIABLES} scripts

  - make V=1 ${MAKEVARIABLES} M=drivers/usb/class CONFIG_USB_PRINTER=m modules
  - make V=1 ${MAKEVARIABLES} M=drivers/usb/class CONFIG_USB_PRINTER=m INSTALL_MOD_PATH=$APPVEYOR_BUILD_FOLDER/modules modules_install

  - cd $APPVEYOR_BUILD_FOLDER/hello

  - make V=1 ${MAKEVARIABLES} -C $APPVEYOR_BUILD_FOLDER/linux-$KERNELVERSION M=$PWD modules
  - make V=1 ${MAKEVARIABLES} -C $APPVEYOR_BUILD_FOLDER/linux-$KERNELVERSION M=$PWD INSTALL_MOD_PATH=$APPVEYOR_BUILD_FOLDER/modules modules_install

test: off
artifacts:
- path: modules
  name: modules
